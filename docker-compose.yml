services:

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: report_engine_app
    restart: unless-stopped
    working_dir: /var/www
    entrypoint: >
      sh -c "
        chmod -R 777 /var/www/storage &&
        chmod -R 777 /var/www/bootstrap/cache &&
        php artisan config:clear &&
        php artisan migrate --force &&
        /usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf
      "
    volumes:
      - .:/var/www
      - /var/www/vendor
      - ./storage:/var/www/storage
    depends_on:
      - redis
    networks:
      - report_network

  nginx:
    image: nginx:alpine
    container_name: report_engine_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - report_network

  redis:
    image: redis:alpine
    container_name: report_engine_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - report_network

networks:
  report_network:
    driver: bridge
