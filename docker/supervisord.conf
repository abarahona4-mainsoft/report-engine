[supervisord]
nodaemon=true
user=root
logfile=/var/www/storage/logs/supervisord.log
pidfile=/var/run/supervisord.pid

[program:php-fpm]
command=/usr/local/sbin/php-fpm
autostart=true
autorestart=true
priority=5
stdout_logfile=/var/www/storage/logs/php-fpm.out.log
stderr_logfile=/var/www/storage/logs/php-fpm.err.log

[program:queue-worker]
command=php /var/www/artisan queue:work redis --sleep=3 --tries=3 --timeout=90
autostart=true
autorestart=true
startsecs=5
startretries=3
priority=10
stdout_logfile=/var/www/storage/logs/queue.out.log
stderr_logfile=/var/www/storage/logs/queue.err.log